<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Responsive Image Gallery</h1>
        <div id="filter-buttons" class="filter-buttons">
            <button data-filter="all" class="active">All</button>
            <button data-filter="nature">Nature</button>
            <button data-filter="animals">Animals</button>
            <button data-filter="tech">Technology</button>
            <button data-filter="uncategorized">Uncategorized</button>
        </div>
    </header>

    <main>
        <div class="gallery" id="gallery">
            <!-- Images will be injected by JavaScript -->
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-img" src="" alt="">
        <div class="caption"></div>
        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
